name: Deploy Ramleytech

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      SERVER_IP: ${{ secrets.SERVER_IP }}
      SERVER_USER: ${{ secrets.SERVER_USER }}

    steps:
      - name: Validate required secrets
        run: |
          if [ -z "$SERVER_IP" ]; then echo "SERVER_IP is missing"; exit 1; fi
          if [ -z "$SERVER_USER" ]; then echo "SERVER_USER is missing"; exit 1; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo "SSH_PRIVATE_KEY is missing"; exit 1; fi
          echo "Secrets look present (not printing them)."

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$SERVER_IP" >> ~/.ssh/known_hosts

      - name: Pull main, build, restart
        run: |
          ssh "$SERVER_USER@$SERVER_IP" << 'EOF'
            set -e
            cd ~/apps/ramleytech
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            npm ci
            npm run build
            pm2 restart ramleytech || pm2 start npm --name ramleytech -- start -- -p 3002
            pm2 save
          EOF